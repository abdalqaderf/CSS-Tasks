<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <header>
        <h1 class="logo">Linked <span class="in">in</span></h1>
    </header>
    <form action="#">

        <div class="login-box">
            <h2 class="sign-in">Sign in</h2>
            <p class="subtitle">Stay update on your professional world</p>
            <input type="text" placeholder="Email or Phone" name="email-or-data" class="email-dialog" >
            <div class="password-container">
                <input type="password" name="password" placeholder="Password" class="password-dialog">
                <span class="show">show</span>
            </div>
            <a href="#" class="forget">Forget password?</a>

            <button class="signin-btn">Sign in</button>
            <div class="divider-container">
                <hr>
                <span class="or">or</span>
                <hr>
            </div>            
            <button class="apple-btn">
                <span class="fa fa-apple"></span>Sign in with apple
            </button>
        </div>
    </form>
        <footer>
        <p class="register">New to LinkedIn? <a href="" class="join">Join now</a></p>
    </footer>

    <!--the end of linkendin -->
<br><br><br><br><br><hr>
    <nav class="navbar">
        <div class="logo">Scratch</div>
        <div class="nav-links">
            <a href="#" class="signup-link">Signup</a>
            <a href="#" class="login-link">Login</a>
        </div>
    </nav>
    <main class="login-container">
        <form class="login-form">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" >
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" >
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
    </main>

    <!--the end of second -->
    <br><br><br><br><br><hr>
<div class="form3">

    <div class="login-card">
        <h2>Login</h2>
        
        <form>
            <input type="email" placeholder="Email" class="form-input" required>
            <input type="password" placeholder="Password" class="form-input" required>
            
            <label class="show-password">
                <input type="checkbox">
                Show Password
            </label>
            
            <button type="submit" class="sign-in-btn">SIGN IN</button>
        </form>
        
        <div class="footer-links">
            <p>Forgot <a href="#">Username / Password</a>?</p>
            <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>
    </div>
</div>
<!--the end of 3-->
<br><br><br><br><br><hr>

<div class="form4">

    <div class="login-box1">
        <h2>USER LOGIN</h2>
        
        <form>
            <div class="input-container1">
                <label for="username">Username</label>
                <input type="text" id="username" >
            </div>
            
            <div class="input-container1">
                <label for="password">Password</label>
                <input type="password" id="password" class="active" >
            </div>
            
            <button type="submit" class="login-btn1">LOGIN</button>
        </form>
        
        <a href="#" class="forgot-link">Forgot Password?</a>
    </div>
</div>
