    <main class="main2">

        <div class="reg-card">
            <h2>CODEWITHRANDOM</h2>
            <p class="sub">Thank you for Being with me</p>
            
            <form>
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" required>
            </div>
            
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            
            <div class="input-group">
                <label for="repeat-password">Repeat password</label>
                <input type="password" id="repeat-password" required>
            </div>
            
            <button type="submit" class="register-btn">Register</button>
        </form>
    </div>
</main>
    
    <!-- 3 -->
     <main class="main3">

         <div class="contact-card">
             <h2>Contact Us</h2>
             
             <form>
                 <input type="text" placeholder="Full Name" required>
                 <input type="email" placeholder="Email" required>
                 <input type="tel" placeholder="tel: XXX XXX XXXX" required>
            
            <textarea placeholder="Your Message Here..." rows="6" required></textarea>
            
            <button type="submit" class="send-btn">Send</button>
        </form>
    </div>
</main>
